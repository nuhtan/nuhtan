<div class="grid-container">
    <mat-toolbar>
        <h3 mat-h3>
            Schedules:
        </h3>
        <span style="flex: 1 1 auto"></span>
        <button mat-icon-button routerLink="create">
            <mat-icon>add</mat-icon>
        </button>
    </mat-toolbar>
    <mat-grid-list cols="12" rowHeight="100px">
        <mat-grid-tile [colspan]="3" [rowspan]=1>
            <mat-card>
                <mat-card-content>
                    TST 101
                </mat-card-content>
            </mat-card>
        </mat-grid-tile>
        <mat-grid-tile [colspan]="3" [rowspan]=1>
            <mat-card>
                <mat-card-content>
                    TST 101
                </mat-card-content>
            </mat-card>
        </mat-grid-tile>
        <mat-grid-tile [colspan]="3" [rowspan]=1>
            <mat-card>
                <mat-card-content>
                    TST 101
                </mat-card-content>
            </mat-card>
        </mat-grid-tile>
        <mat-grid-tile [colspan]="3" [rowspan]=1>
            <mat-card>
                <mat-card-content>
                    TST 101
                </mat-card-content>
            </mat-card>
        </mat-grid-tile>
        <mat-grid-tile [colspan]="12" [rowspan]=1>
            <mat-card>
                <mat-card-content>
                    <button mat-icon-button (click)="decrementDay()">
                        <mat-icon>arrow_back</mat-icon>
                    </button>
                    <button mat-icon-button color="primary" [matMenuTriggerFor]="menu">
                        <mat-icon>person</mat-icon>
                    </button>
                    <mat-menu #menu="matMenu">
                        <mat-list>
                            <mat-list-item>
                                <mat-checkbox></mat-checkbox>
                            </mat-list-item>
                        </mat-list>
                    </mat-menu>
                    <mat-form-field style="width: 73px;">
                        <input matInput [matDatepicker]="picker" [(ngModel)]="dateString">
                    </mat-form-field>
                    <mat-datepicker-toggle matSuffix [for]="picker"></mat-datepicker-toggle>
                    <mat-datepicker #picker></mat-datepicker>
                    <button mat-icon-button (click)="incrementDay()">
                        <mat-icon>
                            arrow_forward
                        </mat-icon>
                    </button>
                </mat-card-content>
            </mat-card>
        </mat-grid-tile>
    </mat-grid-list>
</div>
